name: Test Getting Started

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Docker
        uses: docker/setup-buildx-action@v2

      - name: Run Getting Started Script
        run: |
          cd docker/getting-started
          chmod +x start.sh
          ./start.sh
